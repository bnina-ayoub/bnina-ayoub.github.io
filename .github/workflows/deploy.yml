name: Build & Deploy Portfolio to GitHub Pages

# Run on every push to the main branch + allow manual trigger from the Actions tab
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissions needed for the official GitHub Pages deployment action
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent overlapping deploys
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
      
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          if [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          else
            yarn install
          fi

      - name: Build static site
        env:
          # Use relative asset paths so the build works on any GitHub Pages URL
          # (root domain, project subpath, or custom domain).
          PUBLIC_URL: "."
          CI: "false"
        run: yarn build

      - name: Add .nojekyll (disables GitHub Pages Jekyll processing)
        run: touch build/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/build

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
